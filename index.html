<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тотализатор</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: auto; }
        .outcome { border: 1px solid #ccc; padding: 16px; margin: 8px; cursor: pointer; }
        .selected { background: #cfe4ff; }
    </style>
</head>
<body>
    <h1>Ставки на событие</h1>
    <div>
        <div class="outcome" data-outcome="A">Победа А — коэф. <span id="coeffA">—</span><br>Банк: <span id="poolA">0</span></div>
        <div class="outcome" data-outcome="B">Победа Б — коэф. <span id="coeffB">—</span><br>Банк: <span id="poolB">0</span></div>
    </div>
    <input type="number" id="betAmount" placeholder="Сумма ставки">
    <button id="placeBet">Сделать ставку</button>
    <div id="message"></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwijged2Ox4ThFxD2w7Vme3NcyWK1ztIeuCB684puuJiEQT9Ar5v2nhAFCbUjpgxzfY/exec';
        let selected = 'A';
        document.querySelectorAll('.outcome').forEach(div => {
            div.onclick = () => {
                document.querySelectorAll('.outcome').forEach(d => d.classList.remove('selected'));
                div.classList.add('selected');
                selected = div.dataset.outcome;
            };
        });
        async function load() {
            const res = await fetch(API_URL);
            const data = await res.json();
            document.getElementById('coeffA').innerText = data.coeffA;
            document.getElementById('coeffB').innerText = data.coeffB;
            document.getElementById('poolA').innerText = data.poolA;
            document.getElementById('poolB').innerText = data.poolB;
        }
        document.getElementById('placeBet').onclick = async () => {
            const amount = parseFloat(document.getElementById('betAmount').value);
            if (!amount || amount <= 0) return alert('Введите сумму');
            const userId = localStorage.getItem('userId') || (() => { let id = 'user_' + Math.random(); localStorage.setItem('userId', id); return id; })();
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, outcome: selected, betAmount: amount })
            });
            const result = await res.json();
            if (result.success) {
                alert('Ставка принята! Коэф: ' + (selected === 'A' ? result.state.coeffA : result.state.coeffB));
                load();
            } else {
                alert('Ошибка: ' + result.error);
            }
        };
        load();
        setInterval(load, 5000);
    </script>
</body>
</html>
